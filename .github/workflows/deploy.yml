name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_DEFAULT_LOCALE: ar
      # Phase 3: build against the real Supabase backend. NEXT_PUBLIC_* are
      # inlined at build time, so they must be present here (not just in the
      # runtime .env.local). The anon key is a public, RLS-gated client key.
      NEXT_PUBLIC_DATA_SOURCE: supabase
      NEXT_PUBLIC_SUPABASE_URL: https://opqjsrmbivifjuhcjctt.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcWpzcm1iaXZpZmp1aGNqY3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzk0ODgsImV4cCI6MjA5NjE1NTQ4OH0.DtbGSinutJz9X5hLC5TQz8erwVKNaH3M6TwfQvryeCA
      NEXT_PUBLIC_ENABLE_FEEDBACK: 'true'
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      # Intentionally NOT passing SENTRY_AUTH_TOKEN here — the Sentry build
      # wrapper in next.config.mjs is skipped when the token is absent, so
      # we avoid the "Project not found" sentry-cli failure. Runtime Sentry
      # (DSN above) still works; only source-map upload is skipped.
      # SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      # SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      # SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Download fonts (Cairo + Inter)
        run: |
          pnpm add -D @fontsource/cairo @fontsource/inter --silent
          mkdir -p public/fonts/cairo public/fonts/inter
          cp node_modules/@fontsource/cairo/files/cairo-arabic-400-normal.woff2  public/fonts/cairo/Cairo-Regular.woff2
          cp node_modules/@fontsource/cairo/files/cairo-arabic-600-normal.woff2  public/fonts/cairo/Cairo-SemiBold.woff2
          cp node_modules/@fontsource/cairo/files/cairo-arabic-700-normal.woff2  public/fonts/cairo/Cairo-Bold.woff2
          cp node_modules/@fontsource/cairo/files/cairo-arabic-800-normal.woff2  public/fonts/cairo/Cairo-ExtraBold.woff2
          cp node_modules/@fontsource/inter/files/inter-latin-400-normal.woff2   public/fonts/inter/Inter-Regular.woff2
          cp node_modules/@fontsource/inter/files/inter-latin-500-normal.woff2   public/fonts/inter/Inter-Medium.woff2
          cp node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2   public/fonts/inter/Inter-SemiBold.woff2
          cp node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2   public/fonts/inter/Inter-Bold.woff2

      - name: Lint
        run: pnpm lint || true # non-blocking on first deploys

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy-out/.next
          cp -r .next/standalone/. deploy-out/
          cp -r .next/static deploy-out/.next/static
          cp -r public deploy-out/public
          cp ecosystem.config.js deploy-out/
          cp package.json deploy-out/
          ls -la deploy-out/

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Fail fast (and clearly) when the VPS can't be reached on :22, instead
      # of grinding ~4 min through rsync retries. The usual cause is a
      # network/firewall/host issue (the Hostinger hPanel firewall drops all
      # inbound by default — port 22 needs an explicit Accept rule — a
      # fail2ban ban, or an OOM'd box) — NOT the app build, which has already
      # passed by this point.
      - name: VPS reachability preflight
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          USER=$(echo "$VPS_USER" | tr -d '[:space:]')
          HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          n=0
          until [ "$n" -ge 3 ]; do
            if ssh -4 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes \
                 -o ConnectTimeout=15 "$USER@$HOST" 'echo ok' 2>/tmp/ssh_err; then
              echo "✓ VPS reachable on :22"
              exit 0
            fi
            n=$((n + 1))
            echo "preflight attempt $n failed:"; sed 's/^/    /' /tmp/ssh_err 2>/dev/null || true
            [ "$n" -lt 3 ] && sleep 5
          done
          echo "::error title=VPS unreachable::SSH to the VPS on port 22 timed out after 3 attempts (~50s). This is a network/firewall/host issue, not the app build (Typecheck + Build already passed)."
          echo "::error::Check: Hostinger hPanel firewall has an Accept rule for TCP :22 (Source 0.0.0.0/0 — it drops all inbound by default), the deploy public key is in the VPS ~/.ssh/authorized_keys, 'fail2ban-client status sshd', and sshd is running. See README 'Deployment brief'."
          exit 1

      - name: Rsync to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          USER=$(echo "$VPS_USER" | tr -d '[:space:]')
          HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          # -4 forces IPv4: a hostname with an AAAA record makes the runner try
          # IPv6 first, which the VPS firewall/sshd often doesn't accept → a 20s
          # timeout that only "works" when IPv4 happens to be tried. This is the
          # usual cause of intermittent "works 1 in 10" rsync timeouts.
          SSH="ssh -4 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=20"

          # Diagnostics — a full disk or OOM on the VPS is the usual cause of
          # rsync "connection unexpectedly closed" (remote process killed).
          $SSH "$USER@$HOST" 'echo "== disk =="; df -h /var/www 2>/dev/null || df -h /; echo "== mem =="; free -m 2>/dev/null || true' || true

          # Reclaim space from the previous deploy so the transfer has room.
          # Only touches the rebuilt .next/cache and oversized rotated logs.
          $SSH "$USER@$HOST" 'rm -rf /var/www/twingo-erp/.next/cache 2>/dev/null; find /var/log/twingo-erp -type f -name "*.log" -size +50M -delete 2>/dev/null; true' || true

          # Resilient transfer: resume partial files, keep the SSH session
          # alive, and retry transient drops with backoff.
          n=0
          until [ "$n" -ge 3 ]; do
            if rsync -az --delete --delete-delay --partial --timeout=180 \
                 --exclude '.next/cache' \
                 -e "$SSH" \
                 deploy-out/ "$USER@$HOST:/var/www/twingo-erp/"; then
              echo "rsync completed"
              exit 0
            fi
            n=$((n + 1))
            echo "rsync attempt $n failed; retrying in $((n * 10))s…"
            sleep $((n * 10))
          done
          echo "rsync failed after 3 attempts"
          exit 12

      - name: Copy .env.local to VPS (if provided via secret)
        env:
          VPS_ENV_LOCAL: ${{ secrets.VPS_ENV_LOCAL }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          USER=$(echo "$VPS_USER" | tr -d '[:space:]')
          HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          if [ -n "$VPS_ENV_LOCAL" ]; then
            echo "$VPS_ENV_LOCAL" | ssh -4 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no "$USER@$HOST" "cat > /var/www/twingo-erp/.env.local && chmod 600 /var/www/twingo-erp/.env.local"
            echo ".env.local written"
          else
            echo "VPS_ENV_LOCAL secret not set — skipping"
          fi

      - name: Restart PM2 on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          USER=$(echo "$VPS_USER" | tr -d '[:space:]')
          HOST=$(echo "$VPS_HOST" | tr -d '[:space:]')
          ssh -4 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no "$USER@$HOST" 'export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"; cd /var/www/twingo-erp && (pm2 reload twingo-erp || pm2 start ecosystem.config.js) && pm2 save'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
