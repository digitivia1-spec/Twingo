# Twinjo ERP — Nginx site config
#
# Place at /etc/nginx/sites-available/twingo-demo then:
#   sudo ln -s /etc/nginx/sites-available/twingo-demo /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot will append the SSL block when you run:
#   sudo certbot --nginx -d twingo-demo.digitivia.com

server {
    listen 80;
    listen [::]:80;
    server_name twingo-demo.digitivia.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name twingo-demo.digitivia.com;

    # ─── SSL certs (Certbot populates these) ──────────────────────────
    # ssl_certificate /etc/letsencrypt/live/twingo-demo.digitivia.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/twingo-demo.digitivia.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Body size
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
      text/plain text/css text/javascript
      application/javascript application/json
      application/xml image/svg+xml
      font/woff font/woff2;

    # ─── Proxy to Next.js (PM2 → 127.0.0.1:3000) ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Long cache for content-hashed Next.js chunks
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Long cache for self-hosted fonts
    location ~* \.(woff2|woff|ttf|otf)$ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Sentry tunnel route (bypasses ad-blockers)
    location = /monitoring {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
